spring.application.name=order_management
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/orders}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Aabc@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


jwt.secret=${JWT_SECRET:MyVerySecretJWTKeyThatIsAtLeast32CharsLong}
